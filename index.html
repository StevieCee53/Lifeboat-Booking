<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifeboat Booking</title>

<style>
body { font-family:-apple-system,Arial; margin:0; background:#f2f4f7;}
.container { max-width:520px; margin:auto; padding:15px; padding-bottom:100px;}
.card { background:white; border-radius:14px; padding:16px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
label { font-weight:600; display:block; margin-top:10px;}
input,select,textarea { width:100%; padding:14px; margin-top:5px; font-size:16px; border-radius:10px; border:1px solid #ddd;}
.row { display:flex; gap:10px;}
.row div { flex:1;}
button { padding:14px; width:100%; border:none; border-radius:10px; background:#0066cc; color:white; margin-top:10px;}
button:disabled { background:#9aa0a6;}
.sticky { position:fixed; bottom:0; left:0; right:0; background:#f2f4f7; padding:10px;}
.hidden { display:none;}
.smallBtn { width:auto; padding:8px 12px; margin:5px;}
</style>
</head>

<body>

<div id="bookingScreen" class="container">
<h2>Lifeboat Booking</h2>

<div class="card">
<label>Date</label>
<input type="date" id="tourDate">

<label>Time</label>
<select id="tourTime">
<option value="">--Select--</option>
<option>11:00</option>
<option>11:40</option>
<option>12:20</option>
<option>13:00</option>
</select>

<div id="spacesLeft"></div>
<div id="warning"></div>
</div>

<div class="card row">
<div><label>Adults</label><select id="adults"></select></div>
<div><label>Children</label><select id="children"></select></div>
</div>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<textarea id="notes" placeholder="Notes"></textarea>
</div>
</div>

<div class="sticky">
<button id="submitBtn">Submit</button>
<button id="adminBtn">Admin</button>
</div>

<!-- ADMIN LOGIN -->
<div id="loginScreen" class="container hidden">
<div class="card">
<input id="adminPin" type="password" placeholder="PIN">
<button id="loginBtn">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="container hidden">
<h2>Admin</h2>

<input type="date" id="resetDate">
<button id="resetDateBtn">Reset Selected Date</button>

<button id="exportCSV">Export CSV</button>
<button id="exportPDF">Export PDF</button>

<div id="adminList"></div>
<button onclick="location.reload()">Back</button>
</div>

<script>
const API_URL="PASTE_URL";
const CAPACITY=12;
let bookings=[];
let editIndex=null;

// fill dropdowns
for(let i=0;i<=12;i++){
adults.add(new Option(i,i));
children.add(new Option(i,i));
}

// LOAD
async function loadBookings(){
let res=await fetch(API_URL);
bookings=await res.json();
renderAdmin();
validate();
}

// CAPACITY
function getRemaining(d,t){
return CAPACITY-bookings.filter(b=>b.date==d&&b.time==t)
.reduce((s,b)=>s+b.adults+b.children,0);
}

// VALIDATE
function validate(){
let d=tourDate.value,t=tourTime.value;
let a=+adults.value,c=+children.value,total=a+c;

if(!d||!t)return;

let rem=getRemaining(d,t);
spacesLeft.innerText=Math.max(rem-total,0)+" spaces remaining";

if(total>rem){
warning.innerText="Too many people";
}else{
warning.innerText="";
}
}

// SUBMIT
submitBtn.onclick=async()=>{
let b={
date:tourDate.value,time:tourTime.value,
adults:+adults.value,children:+children.value,
name:name.value,phone:phone.value,email:email.value,notes:notes.value
};
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"add",booking:b})});
loadBookings();
};

// ADMIN LOGIN
adminBtn.onclick=()=>{bookingScreen.classList.add("hidden");loginScreen.classList.remove("hidden");}
loginBtn.onclick=()=>{
if(adminPin.value==="ON1329"){
loginScreen.classList.add("hidden");
adminScreen.classList.remove("hidden");
renderAdmin();
}
};

// RENDER ADMIN
function renderAdmin(){
adminList.innerHTML=bookings.map((b,i)=>`
<div class="card">
<b>${b.date} ${b.time}</b><br>
${b.name} (${b.adults+b.children})
<br>
<button class="smallBtn" onclick="editBooking(${i})">Edit</button>
<button class="smallBtn" onclick="deleteBooking(${i})">Delete</button>
</div>`).join("");
}

// DELETE
async function deleteBooking(i){
if(!confirm("Delete?"))return;
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"delete",index:i})});
loadBookings();
}

// EDIT
function editBooking(i){
let b=bookings[i];
name.value=b.name;
phone.value=b.phone;
email.value=b.email;
notes.value=b.notes;
adults.value=b.adults;
children.value=b.children;
tourDate.value=b.date;
tourTime.value=b.time;
editIndex=i;
}

// SAVE EDIT (reuse submit)
submitBtn.onclick=async()=>{
let b={
date:tourDate.value,time:tourTime.value,
adults:+adults.value,children:+children.value,
name:name.value,phone:phone.value,email:email.value,notes:notes.value
};

if(editIndex!==null){
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"update",index:editIndex,booking:b})});
editIndex=null;
}else{
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"add",booking:b})});
}
loadBookings();
};

// RESET DATE
resetDateBtn.onclick=async()=>{
let d=resetDate.value;
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"resetDate",date:d})});
loadBookings();
};

// CSV
exportCSV.onclick=()=>{
let csv="date,time,name\n";
bookings.forEach(b=>csv+=`${b.date},${b.time},${b.name}\n`);
download(csv,"bookings.csv");
};

// PDF
exportPDF.onclick=()=>{
let content=bookings.map(b=>`${b.date} ${b.time} - ${b.name}`).join("\n");
download(content,"bookings.txt"); // simple PDF alternative
};

function download(data,name){
let blob=new Blob([data]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=name;
a.click();
}

loadBookings();
</script>

</body>
</html>
