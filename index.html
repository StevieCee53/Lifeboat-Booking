<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifeboat Booking</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    background: #f2f4f7;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 { text-align: center; }

label { font-weight: 600; margin-top: 10px; display: block; }

select, input, textarea {
    width: 100%;
    padding: 14px;
    margin-top: 5px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.row { display: flex; gap: 10px; }
.row div { flex: 1; }

button {
    padding: 16px;
    width: 100%;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: #0066cc;
    color: white;
    margin-top: 10px;
}

#resetBtn { background: #d93025; }
#adminBtn { background: #444; }

.progress-bar {
    height: 10px;
    background: #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-fill {
    height: 100%;
    background: #188038;
    width: 0%;
}

/* CUSTOM MODAL */
.modal {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-box {
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    width:80%;
    max-width:300px;
}
</style>
</head>

<body>

<div id="bookingScreen" class="container">
<h2>Lifeboat Station Tour Booking</h2>

<div class="card">
<label>Tour Time</label>
<select id="tourTime">
<option value="">-- Select --</option>
<option>11:00</option><option>11:40</option>
<option>12:20</option><option>13:00</option>
</select>

<div id="spacesLeft"></div>
<div id="warning"></div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div class="card">
<div class="row">
<div>
<label>Adults</label>
<select id="adults">
<option>0</option><option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option><option>7</option>
<option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
</select>
</div>

<div>
<label>Children</label>
<select id="children">
<option>0</option><option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option><option>7</option>
<option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
</select>
</div>
</div>
</div>

<div class="card">
<label>Name</label><input id="name">
<label>Phone</label><input id="phone">
<label>Email</label><input id="email">
<label>Notes</label><textarea id="notes"></textarea>
</div>

<button id="submitBtn">Submit</button>
<button id="adminBtn">Admin</button>
<button id="resetBtn">Reset All</button>
</div>

<div id="adminScreen" class="container" style="display:none;">
<h2>Bookings</h2>
<div id="adminTableContainer"></div>
<button onclick="location.reload()">Back</button>
</div>

<!-- EDIT SCREEN -->
<div id="editScreen" class="container" style="display:none;">
<h2>Edit Booking</h2>
<input id="editName">
<input id="editPhone">
<input id="editEmail">
<textarea id="editNotes"></textarea>
<select id="editAdults"><option>0</option><option>1</option></select>
<select id="editChildren"><option>0</option><option>1</option></select>
<button id="saveEditBtn">Save</button>
<button onclick="location.reload()">Cancel</button>
</div>

<!-- CUSTOM MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<p id="modalText"></p>
<button onclick="confirmYes()">Yes</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("lifeboatBookings")||"[]");
let editIndex=null;
let modalAction=null;

function showModal(text, action){
    modalText.innerText = text;
    modal.style.display="flex";
    modalAction = action;
}

function closeModal(){
    modal.style.display="none";
}

function confirmYes(){
    modalAction();
    closeModal();
}

adminBtn.onclick=function(){
    bookingScreen.style.display="none";
    adminScreen.style.display="block";

    adminTableContainer.innerHTML = bookings.map((b,i)=>`
        <div class="card">
        ${b.time} - ${b.name}
        <button onclick="editBooking(${i})">Edit</button>
        <button onclick="deleteBooking(${i})">Delete</button>
        </div>`).join("");
}

function deleteBooking(i){
    showModal("Admin says: Delete this booking?", ()=>{
        bookings.splice(i,1);
        localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
        location.reload();
    });
}

function editBooking(i){
    editIndex=i;
    let b=bookings[i];

    editName.value=b.name;
    editPhone.value=b.phone;
    editEmail.value=b.email;
    editNotes.value=b.notes;

    adminScreen.style.display="none";
    editScreen.style.display="block";
}

saveEditBtn.onclick=function(){
    let b=bookings[editIndex];
    b.name=editName.value;
    b.phone=editPhone.value;
    b.email=editEmail.value;
    b.notes=editNotes.value;

    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
    location.reload();
}
</script>

</body>
</html>
