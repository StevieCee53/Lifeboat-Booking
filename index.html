<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifeboat Booking</title>

<style>
body { font-family:-apple-system,Arial; margin:0; background:#f2f4f7;}
.container { max-width:520px; margin:auto; padding:15px; padding-bottom:100px;}
.card { background:white; border-radius:14px; padding:16px; margin-bottom:15px;}
label { font-weight:600; display:block; margin-top:10px;}
input,select,textarea { width:100%; padding:14px; margin-top:5px;}
.row { display:flex; gap:10px;}
.row div { flex:1;}
button { padding:14px; width:100%; border:none; border-radius:10px; background:#0066cc; color:white; margin-top:10px;}
button:disabled { background:#9aa0a6;}
.sticky { position:fixed; bottom:0; left:0; right:0; background:#f2f4f7; padding:10px;}
.progress-bar { height:10px; background:#ddd; border-radius:6px; overflow:hidden;}
.progress-fill { height:100%; background:#188038; width:0%;}
.hidden { display:none;}
.smallBtn { padding:6px 10px; margin:5px;}
</style>
</head>

<body>

<div id="bookingScreen" class="container">
<h2>Lifeboat Booking</h2>

<div class="card">
<label>Date</label>
<input type="date" id="tourDate">

<label>Time</label>
<select id="tourTime">
<option value="">--Select--</option>
<option>11:00</option>
<option>11:40</option>
<option>12:20</option>
<option>13:00</option>
</select>

<div id="spacesLeft"></div>
<div id="warning" style="color:red;"></div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div class="card row">
<div><label>Adults</label><select id="adults"></select></div>
<div><label>Children</label><select id="children"></select></div>
</div>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<textarea id="notes" placeholder="Notes"></textarea>
</div>
</div>

<div class="sticky">
<button id="submitBtn" disabled>Submit</button>
<button id="adminBtn">Admin</button>
</div>

<div id="loginScreen" class="container hidden">
<div class="card">
<input id="adminPin" type="password" placeholder="PIN">
<button id="loginBtn">Login</button>
<div id="loginError"></div>
</div>
</div>

<div id="adminScreen" class="container hidden">
<h2>Admin</h2>

<input type="date" id="resetDate">
<button id="resetDateBtn">Reset Selected Date</button>

<button id="exportCSV">Export CSV</button>
<button id="exportPDF">Export PDF</button>

<div id="adminList"></div>
<button onclick="location.reload()">Back</button>
</div>

<script>
const API_URL="PASTE_URL_HERE";
const CAPACITY=12;

let bookings=[];
let editIndex=null;

// fill dropdowns
for(let i=0;i<=12;i++){
adults.add(new Option(i,i));
children.add(new Option(i,i));
}

// LOAD BOOKINGS
async function loadBookings(){
let res=await fetch(API_URL);
bookings=await res.json();
validate();
renderAdmin();
}

// REMAINING SPACES
function getRemaining(d,t){
return CAPACITY-bookings
.filter(b=>b.date==d && b.time==t)
.reduce((s,b)=>s+(+b.adults)+(+b.children),0);
}

// VALIDATE (FIXED)
function validate(){
let d=tourDate.value;
let t=tourTime.value;
let a=+adults.value;
let c=+children.value;
let total=a+c;

if(!d||!t){
submitBtn.disabled=true;
progressFill.style.width="0%";
return;
}

let remainingBefore=getRemaining(d,t);
let remainingAfter=remainingBefore-total;

// FIXED progress
let projectedUsed = CAPACITY - Math.max(remainingAfter,0);
progressFill.style.width=(projectedUsed/CAPACITY*100)+"%";

spacesLeft.innerText=Math.max(remainingAfter,0)+" spaces remaining";

if(total===0){
warning.innerText="Select at least one person";
submitBtn.disabled=true;
}
else if(remainingBefore<=0){
warning.innerText="Fully booked";
submitBtn.disabled=true;
}
else if(total>remainingBefore){
warning.innerText="Too many people";
submitBtn.disabled=true;
}
else{
warning.innerText="";
submitBtn.disabled=false;
}
}

// EVENTS
tourDate.onchange=validate;
tourTime.onchange=validate;
adults.onchange=validate;
children.onchange=validate;

// SUBMIT (FIXED SINGLE HANDLER)
submitBtn.onclick=async function(){

let booking={
date:tourDate.value,
time:tourTime.value,
adults:+adults.value,
children:+children.value,
name:name.value,
phone:phone.value,
email:email.value,
notes:notes.value
};

if(editIndex!==null){
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"update",index:editIndex,booking})});
editIndex=null;
}else{
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"add",booking})});
}

await loadBookings();
alert("Saved");
location.reload();
};

// ADMIN LOGIN
adminBtn.onclick=()=>{
bookingScreen.classList.add("hidden");
loginScreen.classList.remove("hidden");
};

loginBtn.onclick=()=>{
if(adminPin.value==="ON1329"){
loginScreen.classList.add("hidden");
adminScreen.classList.remove("hidden");
renderAdmin();
}else{
loginError.innerText="Wrong PIN";
}
};

// ADMIN LIST
function renderAdmin(){
adminList.innerHTML=bookings.map((b,i)=>`
<div class="card">
<b>${b.date} ${b.time}</b><br>
${b.name} (${b.adults+b.children})
<br>
<button class="smallBtn" onclick="editBooking(${i})">Edit</button>
<button class="smallBtn" onclick="deleteBooking(${i})">Delete</button>
</div>
`).join("");
}

// DELETE
async function deleteBooking(i){
if(!confirm("Delete?"))return;
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"delete",index:i})});
loadBookings();
}

// EDIT
function editBooking(i){
let b=bookings[i];
name.value=b.name;
phone.value=b.phone;
email.value=b.email;
notes.value=b.notes;
adults.value=b.adults;
children.value=b.children;
tourDate.value=b.date;
tourTime.value=b.time;
editIndex=i;
}

// RESET DATE
resetDateBtn.onclick=async()=>{
await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"resetDate",date:resetDate.value})});
loadBookings();
};

// CSV
exportCSV.onclick=()=>{
let csv="date,time,name\n";
bookings.forEach(b=>csv+=`${b.date},${b.time},${b.name}\n`);
download(csv,"bookings.csv");
};

// PDF (simple)
exportPDF.onclick=()=>{
let txt=bookings.map(b=>`${b.date} ${b.time} - ${b.name}`).join("\n");
download(txt,"bookings.txt");
};

function download(data,name){
let blob=new Blob([data]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=name;
a.click();
}

loadBookings();
</script>

</body>
</html>
