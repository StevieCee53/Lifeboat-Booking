<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifeboat Booking</title>

<style>
body {
    font-family: -apple-system, Arial;
    margin: 0;
    background: #f2f4f7;
}
.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}
.card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 15px;
}
button {
    padding: 16px;
    width: 100%;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    color: white;
    background: #0066cc;
}
#adminBtn { background:#444; }
#resetBtn { background:#d93025; }

.progress-bar {
    height:10px;
    background:#ddd;
    border-radius:5px;
}
.progress-fill {
    height:100%;
    background:green;
    width:0%;
}
</style>
</head>

<body>

<div id="bookingScreen" class="container">

<h2>Lifeboat Station Tour Booking</h2>

<div class="card">
<select id="tourTime">
<option value="">Select time</option>
<option value="11:00">11:00</option>
<option value="11:40">11:40</option>
<option value="12:20">12:20</option>
<option value="13:00">13:00</option>
</select>

<div id="spacesLeft"></div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div class="card">
Adults:
<select id="adults">
<option value="0">0</option><option value="1">1</option><option value="2">2</option>
<option value="3">3</option><option value="4">4</option><option value="5">5</option>
<option value="6">6</option><option value="7">7</option><option value="8">8</option>
<option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
</select>

Children:
<select id="children">
<option value="0">0</option><option value="1">1</option><option value="2">2</option>
<option value="3">3</option><option value="4">4</option><option value="5">5</option>
<option value="6">6</option><option value="7">7</option><option value="8">8</option>
<option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
</select>
</div>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button id="submitBtn">Submit Booking</button>

<div class="card">
<button id="adminBtn">View Bookings</button>
</div>

<div class="card">
<button id="resetBtn">⚠️ Reset All Bookings</button>
</div>

</div>

<div id="adminScreen" class="container" style="display:none;">
<h2>Bookings</h2>
<div id="adminTableContainer"></div>
<button onclick="location.reload()">Back</button>
</div>

<div id="editScreen" class="container" style="display:none;">
<h2>Edit Booking</h2>

<input id="editName">
<input id="editPhone">
<input id="editEmail">
<textarea id="editNotes"></textarea>

<button id="saveEditBtn">Save Changes</button>
<button onclick="location.reload()">Cancel</button>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("lifeboatBookings") || "[]");
let editIndex = null;

function updateSpaces() {
    const time = tourTime.value;
    if (!time) return;

    let used = bookings
        .filter(b => b.time === time)
        .reduce((sum, b) => sum + b.adults + b.children, 0);

    let remaining = 12 - used;

    spacesLeft.innerText = remaining + " spaces remaining";
    progressFill.style.width = (used / 12 * 100) + "%";
}

tourTime.onchange = updateSpaces;
adults.onchange = updateSpaces;
children.onchange = updateSpaces;

submitBtn.onclick = function(){
    if (!tourTime.value) {
        alert("Please select a time");
        return;
    }

    let booking = {
        time: tourTime.value,
        adults: +adults.value,
        children: +children.value,
        name: name.value || "No name"
    };

    bookings.push(booking);
    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
    location.reload();
};

adminBtn.onclick = function(){
    bookingScreen.style.display = "none";
    adminScreen.style.display = "block";

    adminTableContainer.innerHTML = bookings.map((b,i)=>`
        <div class="card">
            ${b.time} - ${b.name}
            <button onclick="editBooking(${i})">Edit</button>
            <button onclick="deleteBooking(${i})">Delete</button>
        </div>
    `).join("");
};

function deleteBooking(i){
    if(!confirm("Admin says:\nDelete this booking?")) return;

    bookings.splice(i,1);
    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
    location.reload();
}

function editBooking(i){
    editIndex = i;
    let b = bookings[i];

    editName.value = b.name;
    editPhone.value = b.phone || "";
    editEmail.value = b.email || "";
    editNotes.value = b.notes || "";

    adminScreen.style.display = "none";
    editScreen.style.display = "block";
}

saveEditBtn.onclick = function(){
    let b = bookings[editIndex];

    b.name = editName.value;
    b.phone = editPhone.value;
    b.email = editEmail.value;
    b.notes = editNotes.value;

    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
    location.reload();
};

resetBtn.onclick = function(){
    if(!confirm("Admin says:\nAre you sure? This deletes ALL bookings.")) return;

    if(prompt("Password") !== "ON1329") return;

    localStorage.clear();
    location.reload();
};
</script>

</body>
</html>
