<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifeboat Booking</title>

<style>
body { font-family: -apple-system, Arial; margin:0; background:#f2f4f7;}
.container { max-width:520px; margin:auto; padding:15px; padding-bottom:100px;}
.card { background:white; border-radius:14px; padding:16px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
label { font-weight:600; display:block; margin-top:10px;}
input,select,textarea { width:100%; padding:14px; margin-top:5px; font-size:16px; border-radius:10px; border:1px solid #ddd;}
.row { display:flex; gap:10px;}
.row div { flex:1;}
button { padding:16px; width:100%; border:none; border-radius:12px; background:#0066cc; color:white; margin-top:10px;}
button:disabled { background:#9aa0a6;}
.sticky { position:fixed; bottom:0; left:0; right:0; background:#f2f4f7; padding:10px;}
#warning { color:#d93025; font-weight:bold;}
#spacesLeft { color:#188038; font-weight:bold;}
.progress-bar { height:10px; background:#e0e0e0; border-radius:6px; overflow:hidden; margin-top:10px;}
.progress-fill { height:100%; background:#188038; width:0%;}
.hidden { display:none;}
</style>
</head>

<body>

<div id="bookingScreen" class="container">
<h2>Lifeboat Station Tour Booking</h2>

<div class="card">
<label>Date</label>
<input type="date" id="tourDate">

<label>Tour Time</label>
<select id="tourTime">
<option value="">-- Select --</option>
<option value="11:00">11:00</option>
<option value="11:40">11:40</option>
<option value="12:20">12:20</option>
<option value="13:00">13:00</option>
</select>

<div id="spacesLeft"></div>
<div id="warning"></div>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>
</div>

<div class="card">
<div class="row">
<div>
<label>Adults</label>
<select id="adults"></select>
</div>
<div>
<label>Children</label>
<select id="children"></select>
</div>
</div>
</div>

<div class="card">
<label>Name</label>
<input id="name">
<label>Phone</label>
<input id="phone" type="tel">
<label>Email</label>
<input id="email" type="email">
<label>Notes</label>
<textarea id="notes"></textarea>
</div>
</div>

<div class="sticky">
<button id="submitBtn" disabled>Submit Booking</button>
<button id="adminBtn">Admin</button>
</div>

<div id="loginScreen" class="container hidden">
<div class="card">
<h2>Admin Login</h2>
<input id="adminPin" type="password">
<button id="loginBtn">Login</button>
<div id="loginError"></div>
</div>
</div>

<div id="adminScreen" class="container hidden">
<h2>Bookings</h2>
<button id="exportBtn">Export CSV</button>
<div id="adminList"></div>
<button onclick="location.reload()">Back</button>
</div>

<script>
const API_URL = "PASTE_URL_HERE";
const CAPACITY = 12;
let bookings = [];

const tourDateEl = document.getElementById("tourDate");
const tourTimeEl = document.getElementById("tourTime");
const adultsEl = document.getElementById("adults");
const childrenEl = document.getElementById("children");
const submitBtn = document.getElementById("submitBtn");

function fillSelect(el){
for(let i=0;i<=12;i++){
let o=document.createElement("option");
o.value=i;o.text=i;
el.appendChild(o);
}
}
fillSelect(adultsEl);
fillSelect(childrenEl);

async function loadBookings(){
let res = await fetch(API_URL);
bookings = await res.json();
validate();
}

function getRemaining(date,time){
let total = bookings
.filter(b=>b.date===date && b.time===time)
.reduce((s,b)=>s+b.adults+b.children,0);
return CAPACITY-total;
}

function validate(){
const date=tourDateEl.value;
const time=tourTimeEl.value;
const adults=parseInt(adultsEl.value)||0;
const children=parseInt(childrenEl.value)||0;
const total=adults+children;

if(!date||!time){
submitBtn.disabled=true;
return;
}

const remainingBefore=getRemaining(date,time);
const remainingAfter=remainingBefore-total;

// FIXED progress bar
const projectedUsed = CAPACITY - Math.max(remainingAfter,0);
document.getElementById("progressFill").style.width =
(Math.min(projectedUsed,CAPACITY)/CAPACITY)*100+"%";

document.getElementById("spacesLeft").innerText =
Math.max(remainingAfter,0)+" spaces remaining";

if(total===0){
warning.innerText="Select at least one person";
submitBtn.disabled=true;
}
else if(remainingBefore<=0){
warning.innerText="Fully booked";
submitBtn.disabled=true;
}
else if(total>remainingBefore){
warning.innerText="Exceeds capacity by "+(total-remainingBefore);
submitBtn.disabled=true;
}
else{
warning.innerText="";
submitBtn.disabled=false;
}
}

tourDateEl.onchange=validate;
tourTimeEl.onchange=validate;
adultsEl.onchange=validate;
childrenEl.onchange=validate;

submitBtn.onclick=async function(){
const booking={
date:tourDateEl.value,
time:tourTimeEl.value,
adults:parseInt(adultsEl.value),
children:parseInt(childrenEl.value),
name:name.value,
phone:phone.value,
email:email.value,
notes:notes.value
};

await fetch(API_URL,{
method:"POST",
body:JSON.stringify({action:"add",booking})
});

await loadBookings();
alert("Booking confirmed");
location.reload();
};

// ADMIN LOGIN
adminBtn.onclick=()=>{bookingScreen.classList.add("hidden");loginScreen.classList.remove("hidden");}

loginBtn.onclick=function(){
if(adminPin.value==="ON1329"){
loginScreen.classList.add("hidden");
adminScreen.classList.remove("hidden");
renderAdmin();
}else{
loginError.innerText="Wrong PIN";
}
};

function renderAdmin(){
adminList.innerHTML = bookings.map(b=>
`<div class="card">
<b>${b.date} ${b.time}</b><br>
${b.name} (${b.adults+b.children})
</div>`
).join("");
}

// CSV EXPORT
exportBtn.onclick=function(){
let csv="date,time,adults,children,name\n";
bookings.forEach(b=>{
csv+=`${b.date},${b.time},${b.adults},${b.children},${b.name}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="bookings.csv";
a.click();
};

loadBookings();
</script>

</body>
</html>
