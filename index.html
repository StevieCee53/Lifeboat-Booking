<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifeboat Booking</title>

<style>
body {
    font-family: -apple-system, Arial;
    margin: 0;
    background: #f2f4f7;
}
.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}
.card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 15px;
}
button {
    padding: 14px;
    width: 100%;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    color: white;
    background: #0066cc;
}
#adminBtn { background:#444; }
#resetBtn { background:#d93025; }
</style>
</head>

<body>

<div id="bookingScreen" class="container">

<h2>Lifeboat Booking</h2>

<div class="card">
<select id="tourTime">
<option value="">Select time</option>
<option>11:00</option>
<option>11:40</option>
<option>12:20</option>
<option>13:00</option>
</select>
</div>

<div class="card">
Adults:
<select id="adults">
<option>0</option><option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option><option>7</option>
<option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
</select>

Children:
<select id="children">
<option>0</option><option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option><option>7</option>
<option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
</select>
</div>

<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button id="submitBtn">Submit Booking</button>

<div class="card">
<button id="adminBtn">View Bookings</button>
</div>

<div class="card">
<button id="resetBtn">⚠️ Reset All Bookings</button>
</div>

</div>

<div id="adminScreen" class="container" style="display:none;">
<h2>Bookings</h2>
<div id="adminTableContainer"></div>
<button onclick="location.reload()">Back</button>
</div>

<div id="editScreen" class="container" style="display:none;">
<h2>Edit Booking</h2>

<input id="editName">
<input id="editPhone">
<input id="editEmail">
<textarea id="editNotes"></textarea>

<button id="saveEditBtn">Save Changes</button>
<button onclick="location.reload()">Cancel</button>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("lifeboatBookings")||"[]");
let editIndex = null;

submitBtn.onclick = function(){
    let booking = {
        time: tourTime.value,
        adults: +adults.value,
        children: +children.value,
        name: name.value,
        phone: phone.value,
        email: email.value,
        notes: notes.value
    };

    bookings.push(booking);
    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
    location.reload();
};

adminBtn.onclick = function(){
    bookingScreen.style.display = "none";
    adminScreen.style.display = "block";

    adminTableContainer.innerHTML = bookings.map((b,i)=>`
        <div class="card">
            <b>${b.time}</b> - ${b.name}<br>
            Adults: ${b.adults} | Children: ${b.children}
            <div style="margin-top:10px;">
                <button onclick="editBooking(${i})">Edit</button>
                <button onclick="deleteBooking(${i})">Delete</button>
            </div>
        </div>
    `).join("");
};

function deleteBooking(i){
    if(!confirm("Admin says:\n\nDelete this booking?")) return;

    bookings.splice(i,1);
    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
    location.reload();
}

function editBooking(i){
    editIndex = i;
    let b = bookings[i];

    editName.value = b.name;
    editPhone.value = b.phone;
    editEmail.value = b.email;
    editNotes.value = b.notes;

    adminScreen.style.display = "none";
    editScreen.style.display = "block";
}

saveEditBtn.onclick = function(){
    let b = bookings[editIndex];

    b.name = editName.value;
    b.phone = editPhone.value;
    b.email = editEmail.value;
    b.notes = editNotes.value;

    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));
    location.reload();
};

resetBtn.onclick = function(){
    if(!confirm("Admin says:\n\nAre you sure?\nThis will delete ALL bookings.")) return;

    if(prompt("Enter admin password") !== "ON1329") return;

    localStorage.clear();
    location.reload();
};
</script>

</body>
</html>
