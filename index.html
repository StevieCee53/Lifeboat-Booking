<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifeboat Booking</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    margin: 0;
    background: #f2f4f7;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h2 {
    text-align: center;
}

label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
}

select, input, textarea {
    width: 100%;
    padding: 14px;
    margin-top: 5px;
    font-size: 16px;
    border-radius: 10px;
    border: 1px solid #ddd;
    box-sizing: border-box;
}

button {
    touch-action: manipulation;
}

.row {
    display: flex;
    gap: 10px;
}

.row div {
    flex: 1;
}

button {
    padding: 16px;
    width: 100%;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    background: #0066cc;
    color: white;
    margin-top: 10px;
}

button:disabled {
    background: #9aa0a6;
}

#resetBtn { background: #d93025; }
#adminBtn { background: #444; }

#warning { color: #d93025; font-weight: bold; margin-top: 10px; }
#spacesLeft { color: #188038; font-weight: bold; margin-top: 10px; }

.progress-bar {
    height: 10px;
    background: #e0e0e0;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-fill {
    height: 100%;
    background: #188038;
    width: 0%;
}

.sticky {
    position: sticky;
    bottom: 0;
    background: #f2f4f7;
    padding: 10px 0;
}
</style>
</head>

<body>

<div id="bookingScreen" class="container">

<h2>Lifeboat Station Tour Booking</h2>

<div class="card">
    <label>Tour Time</label>
    <select id="tourTime">
        <option value="">-- Select --</option>
        <option value="11:00">11:00</option>
        <option value="11:40">11:40</option>
        <option value="12:20">12:20</option>
        <option value="13:00">13:00</option>
    </select>

    <div id="spacesLeft"></div>
    <div id="warning"></div>

    <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
    </div>
</div>

<div class="card">
    <div class="row">
        <div>
            <label>Adults</label>
            <select id="adults">
                ${[...Array(13).keys()].map(i => `<option value="${i}">${i}</option>`).join("")}
            </select>
        </div>

        <div>
            <label>Children</label>
            <select id="children">
                ${[...Array(13).keys()].map(i => `<option value="${i}">${i}</option>`).join("")}
            </select>
        </div>
    </div>
</div>

<div class="card">
    <label>Contact Name</label>
    <input type="text" id="name">

    <label>Phone</label>
    <input type="text" id="phone">

    <label>Email</label>
    <input type="text" id="email">

    <label>Notes</label>
    <textarea id="notes"></textarea>
</div>

<div class="sticky">
    <button id="submitBtn" disabled>Submit Booking</button>
</div>

<div class="card">
    <button id="resetBtn">Admin: Reset All</button>
    <button id="adminBtn">Admin: View Bookings</button>
</div>

</div>

<div id="confirmationScreen" class="container" style="display:none;">
    <div class="card" style="text-align:center;">
        <h2>✅ Booking Confirmed</h2>
        <p id="confirmDetails"></p>
        <button onclick="location.reload()">Make Another Booking</button>
    </div>
</div>

<div id="adminScreen" class="container" style="display:none;">
    <h2>Admin – Bookings</h2>
    <div id="adminTableContainer"></div>
    <button onclick="location.reload()">Back</button>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("lifeboatBookings") || "[]");

const tourTimeEl = document.getElementById("tourTime");
const adultsEl = document.getElementById("adults");
const childrenEl = document.getElementById("children");
const submitBtn = document.getElementById("submitBtn");

const name = document.getElementById("name");
const phone = document.getElementById("phone");
const email = document.getElementById("email");
const notes = document.getElementById("notes");

function getRemainingSpaces(time) {
    let total = bookings
        .filter(b => b.time === time)
        .reduce((sum, b) => sum + b.adults + b.children, 0);
    return 12 - total;
}

function validate() {
    const time = tourTimeEl.value;
    const adults = parseInt(adultsEl.value || "0", 10);
    const children = parseInt(childrenEl.value || "0", 10);
    const total = adults + children;

    if (!time) {
        submitBtn.disabled = true;
        spacesLeft.innerText = "";
        return;
    }

    const remaining = getRemainingSpaces(time);

    if (total > remaining) {
        spacesLeft.innerText = `${remaining} spaces available`;
    } else {
        spacesLeft.innerText = `${remaining - total} spaces remaining`;
    }

    const used = (12 - remaining) + total;
    progressFill.style.width = (used / 12) * 100 + "%";

    if (remaining <= 0) {
        warning.innerText = "Tour fully booked";
        submitBtn.disabled = true;
        return;
    }

    if (total === 0) {
        warning.innerText = "Select at least one person";
        submitBtn.disabled = true;
        return;
    }

    if (total > remaining) {
        warning.innerText = `Only ${remaining} spaces left`;
        submitBtn.disabled = true;
        return;
    }

    if (name.value.trim() === "" || phone.value.trim() === "") {
        warning.innerText = "Enter name and phone";
        submitBtn.disabled = true;
        return;
    }

    warning.innerText = "";
    submitBtn.disabled = false;
}

tourTimeEl.onchange = validate;
adultsEl.onchange = validate;
childrenEl.onchange = validate;
name.oninput = validate;
phone.oninput = validate;

submitBtn.onclick = function () {
    const booking = {
        id: Date.now(),
        time: tourTimeEl.value,
        adults: parseInt(adultsEl.value, 10),
        children: parseInt(childrenEl.value, 10),
        name: name.value,
        phone: phone.value,
        email: email.value,
        notes: notes.value
    };

    bookings.push(booking);
    localStorage.setItem("lifeboatBookings", JSON.stringify(bookings));

    bookingScreen.style.display = "none";
    confirmationScreen.style.display = "block";

    confirmDetails.innerText =
        `${booking.name} – ${booking.adults} adults, ${booking.children} children at ${booking.time}`;
};

resetBtn.onclick = function () {
    if (prompt("Password?") === "ON1329") {
        localStorage.removeItem("lifeboatBookings");
        location.reload();
    }
};

adminBtn.onclick = function () {
    if (prompt("Password?") !== "ON1329") return;

    bookingScreen.style.display = "none";
    adminScreen.style.display = "block";

    bookings.sort((a,b)=>a.time.localeCompare(b.time));

    adminTableContainer.innerHTML = bookings.map((b,i)=>`
        <div class="card">
            <b>${b.time} – ${b.name}</b><br>
            Adults: ${b.adults} | Children: ${b.children}
        </div>
    `).join("");
};
</script>

</body>
</html>
